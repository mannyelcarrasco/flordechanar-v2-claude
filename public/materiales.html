<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Materiales | Flor de Chañar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root { --sidebar-width:260px; }
        .sidebar { width:var(--sidebar-width); background:var(--secondary); min-height:100vh; position:fixed; display:flex; flex-direction:column; padding:1.5rem 0; }
        .sidebar-logo { display:flex; align-items:center; gap:.7rem; padding:0 1.5rem 2rem; font-family:var(--serif); font-size:1.1rem; font-weight:700; color:#fff; border-bottom:1px solid rgba(255,255,255,.08); }
        .sidebar-section { padding:1.5rem 1rem .5rem; font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:rgba(255,255,255,.35); }
        .sidebar-nav { list-style:none; padding:0 .75rem; margin-top:.5rem; }
        .sidebar-nav li { margin-bottom:.25rem; }
        .sidebar-nav a { display:flex; align-items:center; gap:.75rem; padding:.72rem .85rem; border-radius:var(--r); color:rgba(255,255,255,.65); font-size:.9rem; font-weight:500; transition:var(--tr); }
        .sidebar-nav a:hover { background:rgba(255,255,255,.07); color:#fff; }
        .sidebar-nav a.active { background:var(--primary); color:#fff; }
        .sidebar-user { margin-top:auto; padding:1.5rem; border-top:1px solid rgba(255,255,255,.08); display:flex; align-items:center; gap:.75rem; }
        .user-avatar { width:36px; height:36px; border-radius:50%; background:var(--primary); display:flex; align-items:center; justify-content:center; font-weight:700; color:#fff; font-size:.9rem; flex-shrink:0; }
        .user-name { font-size:.88rem; font-weight:600; color:#fff; }
        .user-role { font-size:.75rem; color:rgba(255,255,255,.5); }
        .main-content { margin-left:var(--sidebar-width); flex:1; padding:2rem 2.5rem; }

        .page-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:2rem; }
        .page-header h1 { font-family:var(--serif); font-size:1.7rem; color:var(--secondary); }
        .page-header p { color:var(--light); font-size:.9rem; margin-top:.3rem; }

        .filter-bar { display:flex; gap:.75rem; margin-bottom:1.5rem; align-items:center; flex-wrap:wrap; }
        .search-input { flex:1; min-width:200px; padding:.55rem 1rem; border:1.5px solid #E5E7EB; border-radius:var(--rf); font-family:var(--font); font-size:.88rem; outline:none; transition:var(--tr); }
        .search-input:focus { border-color:var(--primary); }
        .filter-select { padding:.55rem .9rem; border:1.5px solid #E5E7EB; border-radius:var(--rf); font-family:var(--font); font-size:.86rem; background:#fff; outline:none; cursor:pointer; }

        .mat-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:1.25rem; }
        .mat-card { background:#fff; border-radius:var(--r); padding:1.3rem; box-shadow:0 2px 12px rgba(0,0,0,.05); border:1.5px solid transparent; transition:var(--tr); display:flex; flex-direction:column; gap:.75rem; }
        .mat-card:hover { border-color:var(--primary); transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,.08); }
        .mat-icon { width:44px; height:44px; border-radius:10px; background:rgba(212,163,115,.15); display:flex; align-items:center; justify-content:center; font-size:1.4rem; flex-shrink:0; }
        .mat-icon.pdf { background:rgba(239,68,68,.1); }
        .mat-icon.link { background:rgba(59,130,246,.1); }
        .mat-title { font-size:.95rem; font-weight:600; color:var(--secondary); line-height:1.3; }
        .mat-meta { font-size:.78rem; color:var(--light); display:flex; flex-direction:column; gap:.15rem; }
        .mat-course { display:inline-flex; align-items:center; gap:.3rem; font-size:.72rem; font-weight:600; color:var(--primary); background:rgba(104,122,97,.1); padding:.15rem .5rem; border-radius:var(--rf); }
        .mat-desc { font-size:.82rem; color:var(--light); line-height:1.4; }
        .btn-download { display:inline-flex; align-items:center; gap:.4rem; padding:.5rem 1rem; border-radius:var(--rf); font-size:.82rem; font-weight:600; background:var(--primary); color:#fff; border:none; cursor:pointer; transition:var(--tr); font-family:var(--font); text-decoration:none; margin-top:auto; }
        .btn-download:hover { background:var(--primary-d); transform:translateY(-1px); }

        .empty-state { text-align:center; padding:5rem 2rem; color:var(--light); }
        .empty-state i { font-size:3.5rem; display:block; margin-bottom:1rem; color:#D1D5DB; }
        .empty-state h3 { font-size:1.1rem; color:var(--secondary); margin-bottom:.5rem; }
        .empty-state p { font-size:.88rem; margin-bottom:1.5rem; }
    </style>
</head>
<body>
<aside class="sidebar">
    <div class="sidebar-logo"><img src="logo.png" style="height:26px;border-radius:50%;object-fit:cover;"> Flor de Chañar</div>
    <div class="sidebar-section">Principal</div>
    <ul class="sidebar-nav">
        <li><a href="dashboard.html"><i class="ph ph-house"></i> Mi Aula</a></li>
        <li><a href="escuela.html"><i class="ph ph-books"></i> Catálogo</a></li>
        <li><a href="clase-vivo.html"><i class="ph ph-video-camera"></i> Clases en Vivo</a></li>
        <li><a href="materiales.html" class="active"><i class="ph ph-download-simple"></i> Mis Materiales</a></li>
    </ul>
    <div class="sidebar-section">Comunidad</div>
    <ul class="sidebar-nav">
        <li><a href="foro.html"><i class="ph ph-chats-circle"></i> Foro</a></li>
        <li><a href="ranking.html"><i class="ph ph-trophy"></i> Ranking</a></li>
    </ul>
    <div class="sidebar-section">Cuenta</div>
    <ul class="sidebar-nav">
        <li><a href="configuracion.html"><i class="ph ph-gear"></i> Configuración</a></li>
        <li><a href="login.html"><i class="ph ph-sign-out"></i> Cerrar Sesión</a></li>
    </ul>
    <div class="sidebar-user">
        <div class="user-avatar" id="sbAv">M</div>
        <div><div class="user-name" id="sbNombre">Cargando...</div><div class="user-role">Estudiante</div></div>
    </div>
</aside>

<main class="main-content">
    <div class="page-header">
        <div>
            <h1><i class="ph ph-download-simple" style="color:var(--primary)"></i> Mis Materiales</h1>
            <p>Archivos y recursos descargables de tus cursos inscritos</p>
        </div>
    </div>

    <div class="filter-bar">
        <input type="text" class="search-input" id="searchInput" placeholder="🔍 Buscar material..." oninput="filtrar()">
        <select class="filter-select" id="cursoFilter" onchange="filtrar()">
            <option value="">Todos los cursos</option>
        </select>
    </div>

    <div class="mat-grid" id="matGrid">
        <div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--light)">
            <i class="ph ph-spinner" style="font-size:2rem;display:block;margin-bottom:.5rem"></i> Cargando materiales...
        </div>
    </div>
</main>

<div class="toast" id="toast"><i class="ph ph-check-circle" id="tI"></i><span id="tM"></span></div>
<script src="shared.js"></script>
<script>
let allMateriales = [];

window.onload = async () => {
    const token = getToken();
    if (!token) return;
    const p = decodeToken();
    if (p) {
        document.getElementById('sbNombre').textContent = p.nombre || '';
        document.getElementById('sbAv').textContent = (p.nombre || 'M')[0].toUpperCase();
    }
    await cargarMateriales();
};

async function cargarMateriales() {
    const grid = document.getElementById('matGrid');
    try {
        const token = getToken();
        const res = await fetch('/api/mis-materiales', { headers: { 'Authorization': 'Bearer ' + token } });
        if (!res.ok) throw new Error();
        allMateriales = await res.json();

        // Poblar filtro de cursos
        const cursos = [...new Set(allMateriales.map(m => m.curso_titulo))];
        const sel = document.getElementById('cursoFilter');
        cursos.forEach(c => { sel.innerHTML += `<option value="${c}">${c}</option>`; });

        renderMateriales(allMateriales);
    } catch(e) {
        grid.innerHTML = `<div style="grid-column:1/-1" class="empty-state"><i class="ph ph-warning"></i><h3>Error al cargar</h3><p>No se pudieron cargar los materiales.</p></div>`;
    }
}

function renderMateriales(lista) {
    const grid = document.getElementById('matGrid');
    if (lista.length === 0) {
        grid.innerHTML = `<div style="grid-column:1/-1" class="empty-state">
            <i class="ph ph-file-dashed"></i>
            <h3>Sin materiales disponibles</h3>
            <p>Cuando tus profesores suban archivos a tus cursos aparecerán aquí.</p>
            <a href="escuela.html" class="btn-download">Explorar cursos</a>
        </div>`;
        return;
    }
    grid.innerHTML = lista.map(m => {
        const isPdf = m.url && m.url.match(/\.pdf($|\?)/i);
        const isLink = m.tipo === 'link';
        const iconClass = isPdf ? 'pdf' : isLink ? 'link' : '';
        const icon = isPdf ? 'ph-file-pdf' : isLink ? 'ph-link' : 'ph-file-arrow-down';
        const iconColor = isPdf ? 'color:var(--danger)' : isLink ? 'color:var(--info)' : 'color:var(--accent)';
        return `
        <div class="mat-card">
            <div style="display:flex;align-items:flex-start;gap:.85rem">
                <div class="mat-icon ${iconClass}"><i class="ph ${icon}" style="${iconColor}"></i></div>
                <div style="flex:1;min-width:0">
                    <div class="mat-title">${m.titulo}</div>
                    <div class="mat-meta" style="margin-top:.3rem">
                        <span class="mat-course"><i class="ph ph-books"></i> ${m.curso_titulo}</span>
                        <span style="margin-top:.2rem">${m.modulo_titulo}</span>
                    </div>
                </div>
            </div>
            ${m.descripcion ? `<div class="mat-desc">${m.descripcion}</div>` : ''}
            ${m.url
                ? `<a href="${m.url}" target="_blank" rel="noopener" class="btn-download"><i class="ph ph-download-simple"></i> ${isPdf ? 'Descargar PDF' : 'Abrir recurso'}</a>`
                : `<span style="font-size:.8rem;color:var(--light)">Sin enlace disponible</span>`
            }
        </div>`;
    }).join('');
}

function filtrar() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const curso = document.getElementById('cursoFilter').value;
    const filtered = allMateriales.filter(m =>
        (!curso || m.curso_titulo === curso) &&
        (!q || m.titulo.toLowerCase().includes(q) || (m.descripcion||'').toLowerCase().includes(q))
    );
    renderMateriales(filtered);
}
</script>
</body>
</html>

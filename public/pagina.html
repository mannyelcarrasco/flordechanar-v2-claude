<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando... | Flor de Chañar</title>
    <meta id="metaDesc" name="description" content="">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { background: var(--bg-alt); }

        /* Nav */
        .top-nav {
            background: var(--secondary);
            padding: .9rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .nav-logo {
            font-family: var(--serif);
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: .5rem;
        }
        .nav-logo i { color: var(--primary); }
        .nav-links { display: flex; gap: 1.25rem; align-items: center; }
        .nav-links a {
            color: rgba(255,255,255,.7);
            font-size: .87rem;
            font-weight: 500;
            text-decoration: none;
            transition: color .2s;
        }
        .nav-links a:hover { color: #fff; }
        .nav-links .btn-nav {
            background: var(--primary);
            color: #fff;
            padding: .45rem 1rem;
            border-radius: var(--radius-full);
            font-weight: 600;
        }
        .nav-links .btn-nav:hover { background: var(--primary-d); color:#fff; }

        /* Hero con portada */
        .page-hero {
            background: var(--secondary);
            color: #fff;
            padding: 3.5rem 2rem 2.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .page-hero.has-cover {
            min-height: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }
        .page-hero.has-cover .hero-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: .35;
        }
        .page-hero .hero-content { position: relative; z-index: 1; max-width: 760px; margin: 0 auto; }
        .page-hero h1 {
            font-family: var(--serif);
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: .75rem;
        }
        .page-hero .extracto {
            font-size: 1.05rem;
            color: rgba(255,255,255,.8);
            max-width: 600px;
            margin: 0 auto;
        }

        /* Contenido */
        .page-wrap {
            max-width: 820px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem 4rem;
        }

        .page-content {
            background: #fff;
            border-radius: var(--radius);
            box-shadow: 0 2px 20px rgba(0,0,0,.06);
            padding: 2.5rem 3rem;
        }

        /* Reset tipográfico para contenido Quill */
        .page-content h1, .page-content h2, .page-content h3 {
            font-family: var(--serif);
            color: var(--secondary);
            margin: 1.5rem 0 .6rem;
            line-height: 1.25;
        }
        .page-content h1 { font-size: 1.9rem; }
        .page-content h2 { font-size: 1.45rem; }
        .page-content h3 { font-size: 1.15rem; }
        .page-content p  { line-height: 1.75; margin-bottom: 1rem; color: var(--text); }
        .page-content ul, .page-content ol {
            padding-left: 1.5rem; margin-bottom: 1rem; color: var(--text); line-height: 1.75;
        }
        .page-content li { margin-bottom: .35rem; }
        .page-content img {
            max-width: 100%; border-radius: var(--radius); margin: 1rem 0;
            box-shadow: 0 4px 16px rgba(0,0,0,.1);
        }
        .page-content a { color: var(--primary); text-decoration: underline; }
        .page-content a:hover { color: var(--primary-d); }
        .page-content blockquote {
            border-left: 3px solid var(--primary);
            margin: 1.25rem 0;
            padding: .75rem 1.25rem;
            background: var(--bg-alt);
            border-radius: 0 var(--radius) var(--radius) 0;
            color: var(--light);
            font-style: italic;
        }
        .page-content pre {
            background: #1E293B;
            color: #E2E8F0;
            padding: 1rem 1.25rem;
            border-radius: var(--radius);
            overflow-x: auto;
            font-size: .85rem;
            margin-bottom: 1rem;
        }
        .page-content iframe {
            width: 100%;
            border-radius: var(--radius);
            margin: 1rem 0;
            aspect-ratio: 16/9;
            border: none;
        }

        /* Estados */
        .page-loading, .page-error {
            text-align: center;
            padding: 5rem 2rem;
            color: var(--light);
        }
        .page-loading i, .page-error i {
            font-size: 3rem;
            display: block;
            margin-bottom: .75rem;
            opacity: .3;
        }
        .page-error h2 { color: var(--secondary); font-size: 1.3rem; margin-bottom: .5rem; }

        /* Footer */
        .page-footer {
            background: var(--secondary);
            color: rgba(255,255,255,.5);
            text-align: center;
            padding: 1.75rem;
            font-size: .82rem;
        }
        .page-footer a { color: var(--primary); }

        @media (max-width: 680px) {
            .page-content { padding: 1.5rem 1.25rem; }
            .page-hero h1 { font-size: 1.55rem; }
            .top-nav { padding: .75rem 1rem; }
            .nav-links { gap: .75rem; }
        }
    </style>
</head>
<body>

<!-- Nav -->
<nav class="top-nav">
    <a href="index.html" class="nav-logo"><i class="ph ph-flower-lotus"></i> Flor de Chañar</a>
    <div class="nav-links">
        <a href="index.html">Inicio</a>
        <a href="cursos.html">Cursos</a>
        <a id="navAuth" href="login.html" class="btn-nav">Ingresar</a>
    </div>
</nav>

<!-- Hero (se rellena dinámicamente) -->
<div id="pageHero" style="display:none"></div>

<!-- Contenido -->
<div class="page-wrap">
    <div id="pageMain">
        <div class="page-loading">
            <i class="ph ph-spinner"></i>
            <p>Cargando página...</p>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="page-footer">
    <p>© 2025 Flor de Chañar — <a href="index.html">Inicio</a> · <a href="cursos.html">Cursos</a></p>
</footer>

<script>
// Nav: detectar si está logueado
const _tk = localStorage.getItem('token');
if (_tk) {
    try {
        const payload = JSON.parse(atob(_tk.split('.')[1]));
        const navAuth = document.getElementById('navAuth');
        if (payload.rol === 'admin') {
            navAuth.href = 'admin.html';
            navAuth.textContent = 'Panel Admin';
        } else if (payload.rol === 'profesor') {
            navAuth.href = 'profesor.html';
            navAuth.textContent = 'Mi Panel';
        } else {
            navAuth.href = 'dashboard.html';
            navAuth.textContent = 'Mi Dashboard';
        }
    } catch {}
}

// Obtener slug de la URL: /p/:slug
const pathParts = window.location.pathname.split('/');
const slug = pathParts[pathParts.length - 1] || pathParts[pathParts.length - 2];

async function cargarPagina() {
    try {
        const res = await fetch(`/api/paginas/${slug}`);
        if (!res.ok) {
            mostrarError(res.status === 404
                ? 'Página no encontrada'
                : 'Error al cargar la página');
            return;
        }
        const p = await res.json();

        // Meta
        document.title = `${p.titulo} | Flor de Chañar`;
        document.getElementById('metaDesc').content = p.meta_desc || p.extracto || '';

        // Hero
        const hero = document.getElementById('pageHero');
        hero.style.display = 'block';
        hero.className = `page-hero${p.portada_url ? ' has-cover' : ''}`;
        hero.innerHTML = `
            ${p.portada_url ? `<div class="hero-bg" style="background-image:url('${p.portada_url}')"></div>` : ''}
            <div class="hero-content">
                <h1>${p.titulo}</h1>
                ${p.extracto ? `<p class="extracto">${p.extracto}</p>` : ''}
            </div>`;

        // Contenido
        document.getElementById('pageMain').innerHTML =
            `<div class="page-content">${p.contenido || '<p style="color:var(--light);font-style:italic">Esta página aún no tiene contenido.</p>'}</div>`;

    } catch(e) {
        mostrarError('Error de conexión: ' + e.message);
    }
}

function mostrarError(msg) {
    document.getElementById('pageMain').innerHTML = `
        <div class="page-error">
            <i class="ph ph-warning"></i>
            <h2>${msg}</h2>
            <p>Vuelve al <a href="index.html" style="color:var(--primary)">inicio</a> o revisa la URL.</p>
        </div>`;
}

cargarPagina();
</script>
</body>
</html>
